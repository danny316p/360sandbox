<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>360 Viewer</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css"/>
<script src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js"></script>

<style>
html, body {
  margin:0;
  height:100%;
}
#panorama {
  width:100%;
  height:100vh;
}
</style>
</head>

<body>

<div id="panorama"></div>

<script>
pannellum.viewer('panorama', {
  "default": {
    "firstScene": "scene1",
    "sceneFadeDuration": 1000
  },

  "scenes": {

    "scene1": {
      "title": "Location 1",
      "type": "equirectangular",
      "panorama": "photos/location1.jpg",

      "hotSpots": [
        {
          "pitch": -2,
          "yaw": 120,
          "type": "scene",
          "text": "Go Forward",
          "sceneId": "scene2"
        }
      ]
    },

    "scene2": {
      "title": "Location 2",
      "type": "equirectangular",
      "panorama": "photos/location2.jpg",

      "hotSpots": [
        {
          "pitch": -2,
          "yaw": -60,
          "type": "scene",
          "text": "Go Back",
          "sceneId": "scene1"
        }
      ]
    }

  }
});
</script>

</body>
</html>
